name: Check reminders

# Vercel Hobby sólo permite cron diario, así que el disparo real vive acá:
# le pega a /api/cron/check cada 5 minutos para mandar los push vencidos.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminder check
        run: |
          curl -sf -X POST "${APP_URL}/api/cron/check" \
            -H "authorization: Bearer ${CRON_SECRET}"
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
